<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Objection.lol Character Downloader</title>
<script src="https://cdnjs.cloudflare.com/ajax/libs/jszip/3.10.1/jszip.min.js"></script>
<style>
*{box-sizing:border-box;margin:0;padding:0}
body{font-family:'Courier New',monospace;background:#0e0e0e;color:#d0d0d0;min-height:100vh;display:flex;flex-direction:column;align-items:center;padding:2rem 1rem}
header{text-align:center;margin-bottom:2rem}
.logo{font-size:1.8rem;font-weight:bold;color:#fff;letter-spacing:-1px}
.logo span{color:#e8382a}
.tagline{font-size:0.7rem;color:#555;margin-top:4px;letter-spacing:3px;text-transform:uppercase}
.card{background:#171717;border:1px solid #252525;border-radius:6px;padding:1.5rem;margin-bottom:1rem;width:100%;max-width:680px}
.card-title{font-size:0.7rem;letter-spacing:2px;text-transform:uppercase;color:#555;margin-bottom:1rem}
.row{display:flex;gap:8px;align-items:center}
input[type=text]{background:#0e0e0e;border:1px solid #2a2a2a;border-radius:4px;color:#e0e0e0;font-family:'Courier New',monospace;font-size:1rem;padding:0.55rem 0.8rem;outline:none;transition:border-color 0.2s;width:100%;letter-spacing:3px;text-transform:uppercase}
input[type=text]:focus{border-color:#e8382a}
input[type=text]::placeholder{letter-spacing:1px;text-transform:none;color:#333}
.btn{background:#e8382a;border:none;border-radius:4px;color:#fff;cursor:pointer;font-family:'Courier New',monospace;font-size:0.78rem;font-weight:bold;letter-spacing:1px;padding:0.55rem 1.1rem;text-transform:uppercase;transition:opacity 0.2s;white-space:nowrap}
.btn:hover{opacity:0.85}
.btn:active{opacity:0.65}
.btn:disabled{opacity:0.4;cursor:not-allowed}
.btn-ghost{background:transparent;border:1px solid #333;color:#888}
.btn-ghost:hover:not(:disabled){border-color:#555;color:#ccc}
.btn-sm{padding:0.3rem 0.75rem;font-size:0.7rem}
.status{font-size:0.75rem;padding:0.5rem 0.85rem;border-radius:4px;margin-top:0.85rem;line-height:1.5}
.status.error{background:#2a0a0a;border:1px solid #5a1a1a;color:#ff6b6b}
.status.ok{background:#0a2a0a;border:1px solid #1a5a1a;color:#6bff6b}
.status.loading{background:#1a1a0a;border:1px solid #3a3a1a;color:#ffe06b}
.char-result{width:100%;max-width:680px;border:1px solid #252525;border-radius:6px;overflow:hidden;margin-bottom:1rem}
.char-header{display:flex;align-items:center;gap:14px;padding:1rem 1.1rem;background:#131313;border-bottom:1px solid #222}
.char-avatar{width:52px;height:52px;border-radius:4px;object-fit:contain;background:#0a0a0a;border:1px solid #1e1e1e;image-rendering:pixelated}
.char-name{font-size:1.05rem;color:#fff;font-weight:bold}
.char-sub{font-size:0.68rem;color:#555;letter-spacing:1px;text-transform:uppercase;margin-top:3px}
.char-meta{display:grid;grid-template-columns:1fr 1fr;gap:1px;background:#1a1a1a}
.meta-item{background:#111;padding:0.6rem 0.9rem}
.meta-label{font-size:0.62rem;color:#444;letter-spacing:1px;text-transform:uppercase;margin-bottom:3px}
.meta-value{font-size:0.82rem;color:#bbb;text-transform:capitalize}
.poses-section{padding:0.9rem}
.section-title{font-size:0.65rem;letter-spacing:2px;text-transform:uppercase;color:#444;margin-bottom:0.65rem}
.pose-item{display:flex;align-items:center;gap:10px;padding:0.45rem 0;border-bottom:1px solid #181818}
.pose-item:last-child{border-bottom:none}
.pose-preview{display:flex;gap:4px}
.pose-thumb{width:36px;height:36px;object-fit:contain;background:#0a0a0a;border-radius:2px;border:1px solid #1a1a1a;image-rendering:pixelated}
.pose-thumb-label{font-size:0.55rem;color:#444;text-align:center;margin-top:2px;letter-spacing:1px}
.pose-name{font-size:0.82rem;color:#ccc;flex:1}
.sprite-missing{width:36px;height:36px;background:#0d0d0d;border:1px dashed #222;border-radius:2px;display:flex;align-items:center;justify-content:center;font-size:0.55rem;color:#333}
.dl-bar{display:flex;gap:8px;padding:0.9rem;border-top:1px solid #1a1a1a;flex-wrap:wrap}
.progress-wrap{margin-top:0.85rem}
.progress-label{font-size:0.7rem;color:#555;margin-bottom:5px}
.progress-track{background:#111;border:1px solid #222;border-radius:3px;height:6px;overflow:hidden}
.progress-fill{height:100%;background:#e8382a;border-radius:3px;transition:width 0.2s;width:0%}
</style>
</head>
<body>

<header>
  <div class="logo">OBJECTION<span>!</span></div>
  <div class="tagline">Character Downloader</div>
</header>

<div class="card">
  <div class="card-title">Enter Share Code</div>
  <div class="row">
    <input type="text" id="code-input" placeholder="e.g. AAIEGW" maxlength="12"
      oninput="this.value=this.value.toUpperCase()"
      onkeydown="if(event.key==='Enter')fetchCharacter()">
    <button class="btn" id="fetch-btn" onclick="fetchCharacter()">Fetch</button>
  </div>
  <div id="fetch-status"></div>
</div>

<div id="result-area"></div>

<script>
const PROXY = 'https://corsproxy.io/?url=';
const API_BASE = 'https://objection.lol/api/character/share/';

function setStatus(msg, type) {
  document.getElementById('fetch-status').innerHTML =
    msg ? `<div class="status ${type}">${msg}</div>` : '';
}

function ext(url) {
  try {
    const p = new URL(url).pathname;
    const m = p.match(/\.(gif|png|jpg|jpeg|webp)$/i);
    return m ? m[0] : '.gif';
  } catch { return '.gif'; }
}

async function fetchWithProxy(url) {
  const res = await fetch(PROXY + encodeURIComponent(url));
  if (!res.ok) throw new Error('HTTP ' + res.status);
  return res;
}

async function fetchCharacter() {
  const code = document.getElementById('code-input').value.trim().toUpperCase();
  if (!code) { setStatus('Enter a share code first.', 'error'); return; }

  const btn = document.getElementById('fetch-btn');
  btn.disabled = true;
  setStatus('Fetching character data…', 'loading');
  document.getElementById('result-area').innerHTML = '';

  try {
    const res = await fetchWithProxy(API_BASE + code);
    const data = await res.json();
    setStatus('', '');
    renderResult(data, code);
  } catch(e) {
    setStatus('Could not fetch: ' + e.message + '<br><small>Check the code or try again — proxy may be rate-limited.</small>', 'error');
  } finally {
    btn.disabled = false;
  }
}

function renderResult(d, code) {
  const locMap = {1:'Defense',2:'Prosecution',3:'Witness',4:'Judge',5:'Counsel',6:'Unknown'};
  const loc = locMap[d.location] || (''+d.location) || 'Unknown';
  const poses = d.poses || [];
  const thumb = d.galleryImageUrl || (poses[0]?.idleImageUrl) || '';

  const posesHtml = poses.map((p, i) => {
    const label = p.name || `Pose ${i+1}`;
    const idleEl = p.idleImageUrl
      ? `<div><img class="pose-thumb" src="${p.idleImageUrl}" onerror="this.parentElement.innerHTML='<div class=sprite-missing>—</div>'" alt="idle"><div class="pose-thumb-label">IDLE</div></div>`
      : `<div><div class="sprite-missing">—</div><div class="pose-thumb-label">IDLE</div></div>`;
    const talkEl = p.talkImageUrl
      ? `<div><img class="pose-thumb" src="${p.talkImageUrl}" onerror="this.parentElement.innerHTML='<div class=sprite-missing>—</div>'" alt="talk"><div class="pose-thumb-label">TALK</div></div>`
      : `<div><div class="sprite-missing">—</div><div class="pose-thumb-label">TALK</div></div>`;
    return `<div class="pose-item">
      <div class="pose-preview">${idleEl}${talkEl}</div>
      <span class="pose-name">${label}</span>
    </div>`;
  }).join('');

  document.getElementById('result-area').innerHTML = `
    <div class="char-result" id="char-card">
      <div class="char-header">
        ${thumb ? `<img class="char-avatar" src="${thumb}" onerror="this.style.display='none'" alt="">` : ''}
        <div>
          <div class="char-name">${d.name || 'Unknown'}</div>
          <div class="char-sub">Code: ${code}&nbsp;&nbsp;·&nbsp;&nbsp;${poses.length} pose${poses.length!==1?'s':''}</div>
        </div>
      </div>
      <div class="char-meta">
        <div class="meta-item"><div class="meta-label">Nameplate</div><div class="meta-value">${d.nameplate||'—'}</div></div>
        <div class="meta-item"><div class="meta-label">Location</div><div class="meta-value">${loc}</div></div>
        <div class="meta-item"><div class="meta-label">Speech Blip</div><div class="meta-value">${d.speechBlip||'—'}</div></div>
        <div class="meta-item"><div class="meta-label">Side</div><div class="meta-value">${d.imageSide||'—'}</div></div>
      </div>
      <div class="poses-section">
        <div class="section-title">Poses</div>
        ${posesHtml || '<div style="color:#444;font-size:0.8rem">No poses found</div>'}
      </div>
      <div class="dl-bar">
        <button class="btn" id="zip-btn" onclick="downloadZip()">⬇ Download ZIP</button>
        <button class="btn btn-ghost btn-sm" onclick="downloadJson()">Download JSON</button>
      </div>
      <div id="zip-progress" style="display:none;padding:0 0.9rem 0.9rem">
        <div class="progress-label" id="progress-label">Preparing…</div>
        <div class="progress-track"><div class="progress-fill" id="progress-fill"></div></div>
      </div>
    </div>`;

  window._charData = d;
  window._charCode = code;
}

async function downloadZip() {
  const d = window._charData;
  const code = window._charCode;
  if (!d) return;

  const zipBtn = document.getElementById('zip-btn');
  const progressWrap = document.getElementById('zip-progress');
  const progressLabel = document.getElementById('progress-label');
  const progressFill = document.getElementById('progress-fill');

  zipBtn.disabled = true;
  progressWrap.style.display = 'block';

  const zip = new JSZip();
  const folderName = (d.name || code).replace(/[^a-z0-9]/gi, '_');
  const folder = zip.folder(folderName);

  // Add character JSON
  folder.file('character.json', JSON.stringify(d, null, 2));

  const poses = d.poses || [];
  const spritesToFetch = [];

  poses.forEach((p, i) => {
    const poseName = (p.name || `pose_${i+1}`).replace(/[^a-z0-9]/gi, '_');
    if (p.idleImageUrl) spritesToFetch.push({ url: p.idleImageUrl, path: `sprites/${poseName}_idle${ext(p.idleImageUrl)}` });
    if (p.talkImageUrl) spritesToFetch.push({ url: p.talkImageUrl, path: `sprites/${poseName}_talk${ext(p.talkImageUrl)}` });
  });

  if (d.galleryImageUrl) {
    spritesToFetch.push({ url: d.galleryImageUrl, path: `gallery${ext(d.galleryImageUrl)}` });
  }

  let done = 0;
  const total = spritesToFetch.length;

  const updateProgress = (label) => {
    const pct = total > 0 ? Math.round((done / total) * 100) : 100;
    progressFill.style.width = pct + '%';
    progressLabel.textContent = label || `Downloading sprites… ${done}/${total}`;
  };

  updateProgress(`Downloading sprites… 0/${total}`);

  await Promise.all(spritesToFetch.map(async ({ url, path }) => {
    try {
      const res = await fetchWithProxy(url);
      const blob = await res.blob();
      folder.file(path, blob);
    } catch {
      // skip failed sprites silently
    } finally {
      done++;
      updateProgress(`Downloading sprites… ${done}/${total}`);
    }
  }));

  updateProgress('Building ZIP…');

  const blob = await zip.generateAsync({ type: 'blob', compression: 'DEFLATE', compressionOptions: { level: 6 } });
  const a = document.createElement('a');
  a.href = URL.createObjectURL(blob);
  a.download = folderName + '_' + code + '.zip';
  a.click();

  progressLabel.textContent = '✓ Done!';
  progressFill.style.background = '#2a8a2a';
  zipBtn.disabled = false;
}

function downloadJson() {
  const d = window._charData;
  const code = window._charCode;
  if (!d) return;
  const name = (d.name || code).replace(/[^a-z0-9]/gi, '_');
  const a = document.createElement('a');
  a.href = URL.createObjectURL(new Blob([JSON.stringify(d, null, 2)], { type: 'application/json' }));
  a.download = name + '_' + code + '.json';
  a.click();
}
</script>
</body>
</html>
