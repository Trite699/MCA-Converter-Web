<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Ace Attorney ARC Editor</title>
<style>
  *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

  :root {
    --bg: #ffffff;
    --bg2: #f5f5f4;
    --bg3: #eeede9;
    --text: #1a1a18;
    --text2: #6b6b67;
    --text3: #9b9b96;
    --border: rgba(0,0,0,0.12);
    --border2: rgba(0,0,0,0.22);
    --info-bg: #e6f1fb;
    --info-text: #185fa5;
    --info-border: rgba(24,95,165,0.3);
    --success-text: #0f6e56;
    --warn-text: #854f0b;
    --radius: 8px;
    --radius-lg: 12px;
    --mono: ui-monospace, 'Cascadia Code', 'Fira Mono', monospace;
    --sans: system-ui, -apple-system, sans-serif;
  }

  @media (prefers-color-scheme: dark) {
    :root {
      --bg: #1c1c1a;
      --bg2: #242422;
      --bg3: #2c2c2a;
      --text: #f0efe8;
      --text2: #9b9b96;
      --text3: #6b6b67;
      --border: rgba(255,255,255,0.10);
      --border2: rgba(255,255,255,0.18);
      --info-bg: #0c3055;
      --info-text: #85b7eb;
      --info-border: rgba(133,183,235,0.3);
      --success-text: #5dcaa5;
      --warn-text: #fac775;
    }
  }

  body {
    font-family: var(--sans);
    background: var(--bg3);
    color: var(--text);
    min-height: 100vh;
    padding: 1.5rem;
  }

  h1 { font-size: 20px; font-weight: 500; }
  h2 { font-size: 16px; font-weight: 500; }

  .app { max-width: 1100px; margin: 0 auto; }

  .toolbar {
    display: flex;
    align-items: center;
    gap: 10px;
    margin-bottom: 1.25rem;
    flex-wrap: wrap;
  }
  .toolbar h1 { flex: 1; }

  .btn {
    display: inline-flex;
    align-items: center;
    gap: 6px;
    padding: 6px 14px;
    border-radius: var(--radius);
    border: 0.5px solid var(--border2);
    background: var(--bg);
    color: var(--text);
    font-size: 13px;
    font-family: var(--sans);
    cursor: pointer;
    white-space: nowrap;
    transition: background .12s;
  }
  .btn:hover { background: var(--bg2); }
  .btn:active { transform: scale(.98); }
  .btn:disabled { opacity: .4; cursor: not-allowed; }
  .btn.primary {
    background: var(--info-bg);
    color: var(--info-text);
    border-color: var(--info-border);
  }
  .btn.primary:hover { opacity: .85; }
  .btn.success {
    background: rgba(15,110,86,0.12);
    color: var(--success-text);
    border-color: rgba(15,110,86,0.3);
  }
  .btn.warn {
    background: rgba(133,79,11,0.10);
    color: var(--warn-text);
    border-color: rgba(133,79,11,0.3);
  }

  .drop-zone {
    border: 1.5px dashed var(--border2);
    border-radius: var(--radius-lg);
    padding: 3rem 2rem;
    text-align: center;
    cursor: pointer;
    background: var(--bg);
    transition: background .15s, border-color .15s;
    margin-bottom: 1.25rem;
  }
  .drop-zone:hover, .drop-zone.drag {
    background: var(--bg2);
    border-color: var(--info-border);
  }
  .drop-zone .icon { font-size: 36px; margin-bottom: .5rem; }
  .drop-zone p { color: var(--text2); font-size: 13px; margin-top: .3rem; }

  .info-bar {
    display: flex;
    gap: 1.25rem;
    flex-wrap: wrap;
    background: var(--bg);
    border: 0.5px solid var(--border);
    border-radius: var(--radius);
    padding: .6rem 1rem;
    font-size: 13px;
    color: var(--text2);
    margin-bottom: 1.25rem;
  }
  .info-bar b { color: var(--text); font-weight: 500; }

  .pane {
    display: grid;
    grid-template-columns: 260px 1fr;
    gap: 1rem;
    align-items: start;
  }
  @media (max-width: 680px) { .pane { grid-template-columns: 1fr; } }

  .tree-panel {
    background: var(--bg);
    border: 0.5px solid var(--border);
    border-radius: var(--radius-lg);
    overflow: hidden;
    max-height: 70vh;
    overflow-y: auto;
  }
  .tree-header {
    padding: .5rem .9rem;
    font-size: 11px;
    font-weight: 500;
    color: var(--text2);
    text-transform: uppercase;
    letter-spacing: .06em;
    border-bottom: 0.5px solid var(--border);
    position: sticky; top: 0;
    background: var(--bg); z-index: 1;
    display: flex; align-items: center; justify-content: space-between;
  }
  .tree-item {
    display: flex;
    align-items: center;
    gap: 7px;
    padding: .38rem .9rem;
    font-size: 13px;
    cursor: pointer;
    border-bottom: 0.5px solid var(--border);
    user-select: none;
    transition: background .1s;
  }
  .tree-item:hover { background: var(--bg2); }
  .tree-item.selected { background: var(--info-bg); color: var(--info-text); }
  .tree-item.folder { font-weight: 500; }
  .tree-count { font-size: 11px; }

  .detail-panel {
    background: var(--bg);
    border: 0.5px solid var(--border);
    border-radius: var(--radius-lg);
    overflow: hidden;
    max-height: 70vh;
    overflow-y: auto;
  }
  .detail-header {
    padding: .6rem 1rem;
    font-size: 13px;
    font-weight: 500;
    border-bottom: 0.5px solid var(--border);
    color: var(--text2);
    position: sticky; top: 0;
    background: var(--bg); z-index: 1;
    display: flex; align-items: center; justify-content: space-between; gap: 8px;
  }
  .detail-body { padding: 1rem; }

  .file-row {
    display: flex;
    align-items: center;
    gap: 8px;
    padding: .5rem .75rem;
    border-radius: var(--radius);
    border: 0.5px solid var(--border);
    background: var(--bg2);
    margin-bottom: 5px;
    flex-wrap: wrap;
  }
  .file-row:hover { border-color: var(--border2); }
  .fname {
    flex: 1;
    font-size: 13px;
    font-family: var(--mono);
    word-break: break-all;
    min-width: 120px;
  }
  .fsize { font-size: 12px; color: var(--text2); white-space: nowrap; }
  .fext {
    font-size: 11px;
    font-weight: 500;
    padding: 2px 8px;
    border-radius: var(--radius);
    white-space: nowrap;
    flex-shrink: 0;
  }
  .action-btn {
    font-size: 12px;
    padding: 4px 10px;
    border-radius: var(--radius);
    border: 0.5px solid var(--border2);
    background: transparent;
    color: var(--text);
    cursor: pointer;
    white-space: nowrap;
    font-family: var(--sans);
    transition: background .1s;
  }
  .action-btn:hover { background: var(--bg3); }
  .action-btn.replaced { color: var(--success-text); border-color: rgba(15,110,86,0.35); }
  .action-btn.dl { color: var(--info-text); border-color: var(--info-border); }

  .search-wrap {
    display: flex; align-items: center; gap: 8px;
    margin-bottom: .75rem;
  }
  .search-wrap input {
    flex: 1;
    padding: .35rem .7rem;
    border-radius: var(--radius);
    border: 0.5px solid var(--border2);
    background: var(--bg2);
    color: var(--text);
    font-size: 13px; font-family: var(--sans); outline: none;
  }
  .search-wrap input:focus { box-shadow: 0 0 0 2px var(--info-border); }

  .detail-table { width: 100%; border-collapse: collapse; font-size: 13px; }
  .detail-table td { padding: 5px 0; vertical-align: top; }
  .detail-table td:first-child { color: var(--text2); width: 120px; }
  .detail-table td code { font-family: var(--mono); font-size: 12px; }

  .empty-state {
    display: flex; flex-direction: column;
    align-items: center; justify-content: center;
    padding: 3rem 1rem;
    color: var(--text2); font-size: 14px;
    gap: .5rem; text-align: center;
  }
  .empty-state .icon { font-size: 32px; }

  .mod-badge {
    display: inline-flex; align-items: center; gap: 5px;
    font-size: 12px; color: var(--warn-text);
  }

  .notice {
    background: var(--info-bg); color: var(--info-text);
    border: 0.5px solid var(--info-border);
    border-radius: var(--radius);
    padding: .6rem .9rem;
    font-size: 13px;
    margin-bottom: 1rem;
  }

  /* Extension badge colors */
  .ext-tex  { background:#FBEAF0; color:#72243E }
  .ext-gmd  { background:#F1EFE8; color:#444441 }
  .ext-arc  { background:#E6F1FB; color:#185FA5 }
  .ext-ogg  { background:#FAEEDA; color:#854F0B }
  .ext-gui  { background:#EEEDFE; color:#534AB7 }
  .ext-prp  { background:#EAF3DE; color:#3B6D11 }
  .ext-srq  { background:#E1F5EE; color:#0F6E56 }
  .ext-stqr { background:#EEEDFE; color:#26215C }
  .ext-uik  { background:#FBEAF0; color:#993556 }
  .ext-sbk  { background:#FAECE7; color:#993C1D }
  .ext-sdl  { background:#E1F5EE; color:#04342C }
  .ext-efl  { background:#FAEEDA; color:#412402 }
  .ext-ean  { background:#FAEEDA; color:#633806 }
  .ext-mod  { background:#EEEDFE; color:#3C3489 }
  .ext-mrl  { background:#E6F1FB; color:#0C447C }
  .ext-xfs  { background:#EAF3DE; color:#27500A }
  .ext-lmt  { background:#E1F5EE; color:#085041 }
  .ext-e2d  { background:#FBEAF0; color:#72243E }
  .ext-lcm  { background:#FAECE7; color:#712B13 }
  .ext-sbc  { background:#FCEBEB; color:#791F1F }
  .ext-gfd  { background:#EAF3DE; color:#173404 }
  .ext-mfx  { background:#FAECE7; color:#4A1B0C }
  .ext-swf  { background:#FCEBEB; color:#A32D2D }
  .ext-bin  { background:#F1EFE8; color:#5F5E5A }
  .ext-unknown { background:#F1EFE8; color:#5F5E5A }
</style>
</head>
<body>
<div class="app">

  <div class="toolbar">
    <h1>📦 Ace Attorney ARC Editor</h1>
    <span id="mod-badge" class="mod-badge" style="display:none">✏️ <span id="mod-num">0</span> modified</span>
    <button class="btn" id="clear-btn" style="display:none" onclick="clearFile()">✕ Clear</button>
    <button class="btn warn" id="extract-all-btn" style="display:none" onclick="extractAll()">⬇ Extract All</button>
    <button class="btn primary" id="save-btn" style="display:none" onclick="saveArc()">⬇ Download ARC</button>
  </div>

  <div id="drop-zone" class="drop-zone"
       onclick="document.getElementById('file-input').click()"
       ondragover="onDragOver(event)"
       ondragleave="onDragLeave(event)"
       ondrop="onDrop(event)">
    <div class="icon">📂</div>
    <b style="font-size:15px">Drop an ARC file here</b>
    <p>or click to browse — supports ARC\0 (plain) and ARCC (Blowfish-encrypted, Android/iOS)</p>
    <p style="margin-top:.25rem;font-size:12px">Dual Destinies · Spirit of Justice · DGS1 · DGS2</p>
  </div>
  <input type="file" id="file-input" style="display:none" accept=".arc,.bin" onchange="loadFile(this.files[0])">

  <div id="info-bar" class="info-bar" style="display:none"></div>

  <div id="main-pane" class="pane" style="display:none">
    <div class="tree-panel">
      <div class="tree-header">
        <span>Files</span>
        <span id="tree-count" style="font-size:11px;color:var(--text2)"></span>
      </div>
      <div id="tree"></div>
    </div>
    <div class="detail-panel">
      <div class="detail-header">
        <span id="detail-title">Select a file</span>
      </div>
      <div class="detail-body" id="detail-body">
        <div class="empty-state">
          <div class="icon">📄</div>
          <span>Select a file from the list</span>
        </div>
      </div>
    </div>
  </div>

</div>

      xR = ((xR ^ this._F(xL)) >>> 0);

    xL = ((xL ^ P[0]) >>> 0);

          0x00,0x00,0x00,0x00,0x00,0x00,0x00,0x00] },
];

// ─── Extension hash → extension string (Kuriimu2 MtArcSupport.cs table) ──────
const EXT_MAP = {
  0x02358E1A: '.ogg',  0x241F5DEB: '.tex',  0x0FA5CEDA: '.gmd',
  0x2749C8A4: '.ctc',  0xBFDD099D: '.gui',  0x524DE262: '.prp',
  0x4A11F7DF: '.sdl',  0x4453D1D2: '.srq',  0x1BCC4966: '.stq',
  0x6CAF2B86: '.stqr', 0x176AF87E: '.uik',  0xAD3E1B79: '.sbk',
  0x253F147E: '.efl',  0xFC4DCAC5: '.ean',  0x6DB9FA5F: '.mod',
  0xABD47742: '.mrl',  0x9E178C43: '.xfs',  0x76820D81: '.lmt',
  0x19054795: '.e2d',  0x7618CC9E: '.lcm',  0x0315E81F: '.sbc',
  0x599EB995: '.gfd',  0x4E6ABB26: '.mfx',  0x9B738F4F: '.sngw',
  0x5DF3D9CA: '.arc',  0x7AA81FA1: '.bin',  0x4B704CC7: '.hpe',
  0xDE35EB59: '.wp2',  0x22948394: '.ccl',  0x5CACF14C: '.grp',
  0xA784E7A2: '.dmo',  0x1FDFE89F: '.swf',  0x7F6E2A89: '.lbc',
  0x44C3AFB9: '.e3d',  0x21F1F6FA: '.hvf',  0x2A7F98E5: '.hpe',
  0x0D06BE6B: '.spl',  0x167DBBFF: '.ahap',0x6A6FEAE1: '.mat',
  0xB685B76A: '.gal',
};

function extFromHash(h) {
  return EXT_MAP[h >>> 0] ?? ('.' + (h >>> 0).toString(16).toUpperCase().padStart(8,'0'));
}
function hashFromExt(ext) {
  for (const [k, v] of Object.entries(EXT_MAP)) {
    if (v === ext) return Number(k) >>> 0;
  }
  // Try parsing as hex hash
  const m = ext.match(/^\.([0-9A-Fa-f]{8})$/);
  if (m) return parseInt(m[1], 16) >>> 0;
  return 0;
}

// ─── Zlib inflate / deflate using DecompressionStream ───────────────────────
async function inflate(data) {
  const ds = new DecompressionStream('deflate');
  const writer = ds.writable.getWriter();
  const reader  = ds.readable.getReader();
  writer.write(data).catch(()=>{});
  writer.close().catch(()=>{});
  const chunks = [];
  while (true) {
    const { done, value } = await reader.read();
    if (done) break;
    chunks.push(value);
  }
  const out = new Uint8Array(chunks.reduce((a,c)=>a+c.length,0));
  let off = 0;
  for (const c of chunks) { out.set(c, off); off += c.length; }
  return out;
}

async function deflate(data) {
  const cs = new CompressionStream('deflate');
  const writer = cs.writable.getWriter();
  const reader  = cs.readable.getReader();
  writer.write(data).catch(()=>{});
  writer.close().catch(()=>{});
  const chunks = [];
  while (true) {
    const { done, value } = await reader.read();
    if (done) break;
    chunks.push(value);
  }
  const out = new Uint8Array(chunks.reduce((a,c)=>a+c.length,0));
  let off = 0;
  for (const c of chunks) { out.set(c, off); off += c.length; }
  return out;
}

// ─── State ────────────────────────────────────────────────────────────────────
let arcFiles    = [];   // parsed entries
let arcMagic    = '';   // 'ARC\0' or 'ARCC'
let arcVersion  = 0;
let arcFileName = '';
let arcKey      = null; // Blowfish key bytes if ARCC
let arcKeyName  = '';
let selectedIdx = null;
let modCount    = 0;

// ─── Helpers ─────────────────────────────────────────────────────────────────
function fmtSize(n) {
  if (n < 1024)     return n + ' B';
  if (n < 1048576)  return (n/1024).toFixed(1) + ' KB';
  return (n/1048576).toFixed(2) + ' MB';
}
function extClass(ext) {
  const base = ext.replace('.','').toLowerCase();
  return 'ext-' + (base.match(/^[0-9a-f]{8}$/) ? 'unknown' : base);
}

// ─── Parse ARC ───────────────────────────────────────────────────────────────
async function parseArc(buf, name) {
  let bytes = new Uint8Array(buf);
  const magic4 = String.fromCharCode(bytes[0],bytes[1],bytes[2],bytes[3]);
  let usedKeyName = '';

  if (magic4 === 'ARCC') {
    // Try each known key
    let decrypted = false;
    for (const entry of ARCC_KEYS) {
      const trial = bytes.slice();
      const bf = new Blowfish(entry.key);
      bf.decryptLE(trial);
      const m = String.fromCharCode(trial[0],trial[1],trial[2],trial[3]);
      if (m === 'ARC\0') {
        bytes = trial;
        arcKey = entry.key;
        usedKeyName = entry.name;
        decrypted = true;
        break;
      }
    }
    if (!decrypted) {
      throw new Error('ARCC file could not be decrypted with known keys.\nThis game variant may not be supported yet.');
    }
  } else if (magic4 !== 'ARC\0') {
    throw new Error(`Not an MT Framework ARC file (magic: "${magic4}").\nExpected "ARC\\0" or "ARCC".`);
  }

  const view   = new DataView(bytes.buffer, bytes.byteOffset, bytes.byteLength);
  const version    = view.getInt16(4, true);
  const fileCount  = view.getUint16(6, true);

  // Determine entry size / file data start offset
  // Standard: header = 8 bytes, entries = 80 bytes each (64 filename + 4 extHash + 4 packedSz + 4 unpackedSz + 4 offset)
  // Some versions use 256-byte filenames (extended names)
  const ENTRY_STD = 80;
  const ENTRY_EXT = 316; // 256 + 4+4+4+4+extended offset field
  const HEADER_SZ = 8;

  // Heuristic: try standard 80-byte entries first
  let entrySize = ENTRY_STD;
  // If version >= 9 and some games use 256-byte names, but for DD/SoJ mobile it's 80
  // We'll validate by checking that first entry offset looks sane
  const testOff = HEADER_SZ + fileCount * ENTRY_STD;
  // peek first entry's data offset (at byte 72 in first entry)
  const firstEntryDataOff = fileCount > 0 ? view.getInt32(HEADER_SZ + 72, true) : testOff;
  if (fileCount > 0 && firstEntryDataOff > 0 && firstEntryDataOff < testOff) {
    // Possibly extended 256-byte names? Use 268-byte entries
    entrySize = ENTRY_EXT;
  }

  const fileDataStart = HEADER_SZ + fileCount * entrySize;

  arcFiles = [];
  for (let i = 0; i < fileCount; i++) {
    const eOff = HEADER_SZ + i * entrySize;
    // 64-byte (or 256-byte) null-terminated filename
    const fnLen = entrySize === ENTRY_STD ? 64 : 256;
    let fname = '';
    for (let j = 0; j < fnLen; j++) {
      const c = bytes[eOff + j];
      if (c === 0) break;
      fname += String.fromCharCode(c);
    }

    const extHash     = view.getUint32(eOff + fnLen,     true);
    const packedSize  = view.getInt32 (eOff + fnLen + 4,  true);
    const unpackedRaw = view.getInt32 (eOff + fnLen + 8,  true);
    const dataOffset  = view.getInt32 (eOff + fnLen + 12, true);

    const ext           = extFromHash(extHash);
    const unpackedSize  = (unpackedRaw & 0x3FFFFFFF) >>> 0; // mask off top 2 bits
    const compressed    = (unpackedRaw & 0x40000000) !== 0; // flag

    const compData = bytes.slice(dataOffset, dataOffset + packedSize);

    arcFiles.push({
      index: i, fname, ext, extHash,
      packedSize, unpackedSize, compressed,
      dataOffset, compData,
      replaced: false, replacedRaw: null, replacedName: null,
    });
  }

  arcMagic    = magic4;
  arcVersion  = version;
  arcFileName = name;
  arcKeyName  = usedKeyName;
  modCount    = 0;

  // Info bar
  const totalPacked = arcFiles.reduce((a,f) => a + f.packedSize, 0);
  document.getElementById('info-bar').innerHTML =
    `<span><b>${name}</b></span>
     <span>Format: <b>${magic4 === 'ARCC' ? 'ARCC (decrypted)' : 'ARC\\0'}</b></span>
     ${usedKeyName ? `<span>Key: <b>${usedKeyName}</b></span>` : ''}
     <span>Version: <b>${version}</b></span>
     <span>Files: <b>${fileCount.toLocaleString()}</b></span>
     <span>Packed total: <b>${fmtSize(totalPacked)}</b></span>`;

  document.getElementById('drop-zone').style.display   = 'none';
  document.getElementById('info-bar').style.display    = 'flex';
  document.getElementById('main-pane').style.display   = 'grid';
  document.getElementById('clear-btn').style.display   = '';
  document.getElementById('extract-all-btn').style.display = '';
  document.getElementById('save-btn').style.display    = '';

  selectedIdx = null;
  renderTree();
  renderDetail();
}

// ─── Tree ─────────────────────────────────────────────────────────────────────
function renderTree() {
  const count = document.getElementById('tree-count');
  count.textContent = arcFiles.length + ' files';
  let html = '';
  for (let i = 0; i < arcFiles.length; i++) {
    const f   = arcFiles[i];
    const sel = selectedIdx === i;
    const displayName = f.fname || `[${i}]`;
    html += `<div class="tree-item file${sel ? ' selected' : ''}" onclick="selectFile(${i})" title="${displayName}${f.ext}">
      <span style="font-size:12px">📄</span>
      <span style="flex:1;font-family:var(--mono);font-size:12px;overflow:hidden;text-overflow:ellipsis;white-space:nowrap">
        ${displayName}<span style="opacity:.6">${f.ext}</span>
      </span>
      ${f.replaced ? '<span style="color:var(--success-text);font-size:10px">✓</span>' : ''}
    </div>`;
  }
  document.getElementById('tree').innerHTML = html || '<div style="padding:.75rem;font-size:13px;color:var(--text2)">No files</div>';
}

function selectFile(i) {
  selectedIdx = i;
  renderTree();
  renderDetail();
}

// ─── Detail ───────────────────────────────────────────────────────────────────
function renderDetail() {
  const title = document.getElementById('detail-title');
  const body  = document.getElementById('detail-body');

  if (selectedIdx === null) {
    title.textContent = 'Select a file';
    body.innerHTML = `<div class="empty-state"><div class="icon">📄</div><span>Select a file from the list</span></div>`;
    return;
  }

  const f  = arcFiles[selectedIdx];
  const fi = selectedIdx;
  const displayName = (f.fname || `[${fi}]`) + f.ext;
  title.textContent = displayName;

  body.innerHTML = `
    <table class="detail-table">
      <tr><td>Filename</td><td><code>${f.fname || '(none)'}</code></td></tr>
      <tr><td>Extension</td><td><span class="fext ${extClass(f.ext)}">${f.ext}</span></td></tr>
      <tr><td>Ext hash</td><td><code>0x${f.extHash.toString(16).toUpperCase().padStart(8,'0')}</code></td></tr>
      <tr><td>Packed size</td><td>${fmtSize(f.packedSize)} (${f.packedSize.toLocaleString()} B)</td></tr>
      <tr><td>Unpacked size</td><td>${fmtSize(f.unpackedSize)} (${f.unpackedSize.toLocaleString()} B)</td></tr>
      <tr><td>Compression</td><td>${f.compressed ? '✓ zlib deflate' : '✗ none'}</td></tr>
      <tr><td>Data offset</td><td><code>0x${f.dataOffset.toString(16).toUpperCase()}</code></td></tr>
      <tr><td>Status</td><td>${f.replaced
        ? `<span style="color:var(--success-text)">✓ Replaced with ${f.replacedName}</span>`
        : '<span style="color:var(--text2)">Original</span>'}</td></tr>
    </table>
    <div style="display:flex;gap:8px;margin-top:1rem;flex-wrap:wrap">
      <button class="btn success" onclick="extractFile(${fi})">⬇ Extract (decompressed)</button>
      <button class="btn success" onclick="extractFileRaw(${fi})">⬇ Extract (raw/packed)</button>
      <button class="btn${f.replaced ? ' success' : ''}" onclick="triggerReplace(${fi})">
        ⬆ ${f.replaced ? 'Replace again' : 'Replace file'}
      </button>
    </div>
    <input type="file" id="replace-input-${fi}" style="display:none" onchange="doReplace(${fi}, this)">`;
}

// ─── Extract ──────────────────────────────────────────────────────────────────
async function extractFile(fi) {
  const f = arcFiles[fi];
  const raw = f.replaced ? f.replacedRaw : f.compData;
  let data;
  if (f.compressed && !f.replaced) {
    try { data = await inflate(raw); }
    catch (e) { alert('Decompression failed: ' + e.message); return; }
  } else {
    data = raw;
  }
  downloadBlob(data, (f.fname || `file_${fi}`) + f.ext);
}

function extractFileRaw(fi) {
  const f = arcFiles[fi];
  const data = f.replaced ? f.replacedRaw : f.compData;
  downloadBlob(data, (f.fname || `file_${fi}`) + f.ext + '.packed');
}

async function extractAll() {
  if (!arcFiles.length) return;
  const btn = document.getElementById('extract-all-btn');
  btn.disabled = true;
  btn.textContent = '⏳ Extracting…';

  // Use JSZip-free approach: extract one-by-one and download individually
  // (or batch into a zip using a simple implementation)
  // For simplicity, download as individual files with delay
  for (let i = 0; i < arcFiles.length; i++) {
    btn.textContent = `⏳ ${i+1}/${arcFiles.length}…`;
    await extractFile(i);
    await new Promise(r => setTimeout(r, 80));
  }
  btn.disabled = false;
  btn.innerHTML = '⬇ Extract All';
}

function downloadBlob(data, filename) {
  const blob = new Blob([data], { type: 'application/octet-stream' });
  const url  = URL.createObjectURL(blob);
  const a    = document.createElement('a');
  a.href = url; a.download = filename;
  document.body.appendChild(a); a.click(); document.body.removeChild(a);
  setTimeout(() => URL.revokeObjectURL(url), 8000);
}

// ─── Replace ──────────────────────────────────────────────────────────────────
function triggerReplace(fi) {
  document.getElementById(`replace-input-${fi}`)?.click();
}

function doReplace(fi, input) {
  const file = input.files[0];
  if (!file) return;
  const reader = new FileReader();
  reader.onload = (e) => {
    const data = new Uint8Array(e.target.result);
    if (!arcFiles[fi].replaced) modCount++;
    arcFiles[fi].replaced    = true;
    arcFiles[fi].replacedRaw = data;
    arcFiles[fi].replacedName= file.name;
    // Update sizes
    arcFiles[fi].packedSize  = data.length;
    arcFiles[fi].unpackedSize= data.length;
    arcFiles[fi].compressed  = false;
    updateModBadge();
    renderTree();
    renderDetail();
  };
  reader.readAsArrayBuffer(file);
}

function updateModBadge() {
  const el = document.getElementById('mod-badge');
  document.getElementById('mod-num').textContent = modCount;
  el.style.display = modCount > 0 ? 'inline-flex' : 'none';
}

// ─── Save ARC ─────────────────────────────────────────────────────────────────
async function saveArc() {
  if (!arcFiles.length) return;
  const btn = document.getElementById('save-btn');
  btn.disabled = true; btn.textContent = '⏳ Building…';

  try {
    await _doSaveArc();
  } catch(e) {
    alert('Build failed: ' + e.message);
  } finally {
    btn.disabled = false; btn.innerHTML = '⬇ Download ARC';
  }
}

async function _doSaveArc() {
  const count     = arcFiles.length;
  const HEADER_SZ = 8;
  const ENTRY_SZ  = 80; // always write standard 80-byte entries
  const FN_LEN    = 64;

  // --- Collect final data for each file (raw bytes, already packed if needed) ---
  const finalData = [];
  for (const f of arcFiles) {
    if (f.replaced) {
      // User supplied raw file; store as-is (uncompressed, flag=0)
      finalData.push(f.replacedRaw);
    } else {
      // Keep original packed data unchanged
      finalData.push(f.compData);
    }
  }

  // --- Calculate offsets ---
  const fileDataStart = HEADER_SZ + count * ENTRY_SZ;
  const offsets = new Int32Array(count);
  let pos = fileDataStart;
  for (let i = 0; i < count; i++) {
    offsets[i] = pos;
    pos += finalData[i].length;
  }
  const totalSize = pos;

  // --- Build output buffer ---
  const outBuf  = new ArrayBuffer(totalSize);
  const outView = new DataView(outBuf);
  const outArr  = new Uint8Array(outBuf);

  // Header
  outArr[0]=0x41; outArr[1]=0x52; outArr[2]=0x43; outArr[3]=0x00; // ARC\0
  outView.setInt16(4, arcVersion, true);
  outView.setUint16(6, count, true);

  // Entries
  for (let i = 0; i < count; i++) {
    const f   = arcFiles[i];
    const eOff = HEADER_SZ + i * ENTRY_SZ;
    const fn   = f.fname || '';
    for (let j = 0; j < FN_LEN; j++) {
      outArr[eOff + j] = j < fn.length ? fn.charCodeAt(j) & 0xFF : 0;
    }
    const fd = finalData[i];
    const packedSz   = fd.length;
    const unpackedSz = f.replaced
      ? fd.length                         // no compression flag
      : ((f.compressed ? 0x40000000 : 0) | f.unpackedSize) >>> 0;

    outView.setUint32(eOff + FN_LEN,      f.extHash,        true);
    outView.setInt32 (eOff + FN_LEN + 4,  packedSz,         true);
    outView.setInt32 (eOff + FN_LEN + 8,  unpackedSz,       true);
    outView.setInt32 (eOff + FN_LEN + 12, offsets[i],       true);
  }

  // File data
  for (let i = 0; i < count; i++) {
    outArr.set(finalData[i], offsets[i]);
  }

  // Re-encrypt if originally ARCC
  if (arcMagic === 'ARCC' && arcKey) {
    const bf = new Blowfish(arcKey);
    bf.encryptLE(outArr);
    // Patch magic back to ARCC
    outArr[0]=0x41; outArr[1]=0x52; outArr[2]=0x43; outArr[3]=0x43;
  }

  const outName = arcFileName.replace(/\.(arc|bin)$/i, '') + '_patched.arc';
  downloadBlob(outArr, outName);
}

// ─── Drag & drop / file input ─────────────────────────────────────────────────
function onDragOver(e) { e.preventDefault(); document.getElementById('drop-zone').classList.add('drag'); }
function onDragLeave()  { document.getElementById('drop-zone').classList.remove('drag'); }
function onDrop(e) {
  e.preventDefault();
  document.getElementById('drop-zone').classList.remove('drag');
  const f = e.dataTransfer.files[0];
  if (f) loadFile(f);
}

function loadFile(file) {
  const reader = new FileReader();
  reader.onload = async (e) => {
    try { await parseArc(e.target.result, file.name); }
    catch (err) { alert('Failed to parse ARC:\n' + err.message); }
  };
  reader.readAsArrayBuffer(file);
}

function clearFile() {
  arcFiles = []; arcMagic = ''; arcVersion = 0;
  arcFileName = ''; arcKey = null; selectedIdx = null; modCount = 0;
  document.getElementById('drop-zone').style.display        = '';
  document.getElementById('info-bar').style.display         = 'none';
  document.getElementById('main-pane').style.display        = 'none';
  document.getElementById('clear-btn').style.display        = 'none';
  document.getElementById('extract-all-btn').style.display  = 'none';
  document.getElementById('save-btn').style.display         = 'none';
  document.getElementById('mod-badge').style.display        = 'none';
  document.getElementById('file-input').value = '';
}
</script>
