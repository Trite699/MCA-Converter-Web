<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width, initial-scale=1">
<title>MCA ↔ WAV Converter</title>
<style>
*{box-sizing:border-box;margin:0;padding:0}
:root{
  --bg1:#fff;--bg2:#f5f5f5;--txt1:#111;--txt2:#666;--txt3:#aaa;
  --brd:rgba(0,0,0,0.12);--brd2:rgba(0,0,0,0.2);
  --ok-bg:#e6f9ee;--ok-txt:#1a7a3f;--err-bg:#fdecea;--err-txt:#b71c1c;
  --r:8px;--rl:12px;
}
@media(prefers-color-scheme:dark){
  :root{
    --bg1:#1e1e1e;--bg2:#2a2a2a;--txt1:#f0f0f0;--txt2:#aaa;--txt3:#666;
    --brd:rgba(255,255,255,0.1);--brd2:rgba(255,255,255,0.2);
    --ok-bg:#0d3320;--ok-txt:#4caf82;--err-bg:#3b1010;--err-txt:#f08080;
  }
}
body{font-family:-apple-system,BlinkMacSystemFont,'Segoe UI',sans-serif;background:var(--bg2);color:var(--txt1);padding:2rem 1rem}
.wrap{max-width:580px;margin:0 auto;display:flex;flex-direction:column;gap:12px}
h1{font-size:20px;font-weight:500}
.sub{font-size:13px;color:var(--txt2);margin-top:3px;margin-bottom:4px}
.card{background:var(--bg1);border:0.5px solid var(--brd);border-radius:var(--rl);padding:1rem 1.25rem}
.card-label{font-size:11px;font-weight:500;color:var(--txt2);text-transform:uppercase;letter-spacing:.07em;margin-bottom:10px}
.drop-zone{border:1.5px dashed var(--brd2);border-radius:var(--r);padding:1.5rem 1rem;text-align:center;cursor:pointer;transition:border-color .15s,background .15s;display:flex;flex-direction:column;align-items:center;gap:6px}
.drop-zone:hover,.drop-zone.drag{border-color:var(--txt2);background:var(--bg2)}
.drop-icon{width:32px;height:32px;border-radius:50%;background:var(--bg2);display:flex;align-items:center;justify-content:center;margin-bottom:2px}
.drop-main{font-size:13px;color:var(--txt2);font-weight:500}
.drop-sub{font-size:11px;color:var(--txt3)}
.metrics{display:grid;grid-template-columns:repeat(4,minmax(0,1fr));gap:8px;margin-top:12px}
.metric{background:var(--bg2);border-radius:var(--r);padding:8px 10px}
.metric-l{font-size:11px;color:var(--txt2);margin-bottom:2px}
.metric-v{font-size:13px;font-weight:500;font-family:monospace;white-space:nowrap;overflow:hidden;text-overflow:ellipsis}
.field-row{display:grid;grid-template-columns:1fr 1fr;gap:8px}
.field{display:flex;flex-direction:column;gap:5px}
.field label{font-size:12px;color:var(--txt2);font-weight:500}
.field input,.field select{font-family:monospace;font-size:13px;padding:7px 10px;border-radius:var(--r);border:0.5px solid var(--brd2);background:var(--bg2);color:var(--txt1);width:100%}
.field input:focus,.field select:focus{outline:none;border-color:var(--txt2)}
.btn-row{display:flex;gap:8px;flex-wrap:wrap}
button{font-family:inherit;font-size:13px;font-weight:500;padding:7px 16px;border-radius:var(--r);border:0.5px solid var(--brd2);background:transparent;color:var(--txt1);cursor:pointer;transition:background .12s,opacity .12s;white-space:nowrap}
button:hover:not(:disabled){background:var(--bg2)}
button:active:not(:disabled){transform:scale(0.98)}
button:disabled{opacity:.3;cursor:default}
.btn-solid{background:var(--txt1);color:var(--bg1);border-color:transparent}
.btn-solid:hover:not(:disabled){opacity:.85;background:var(--txt1)}
.status{font-size:13px;padding:8px 12px;border-radius:var(--r);margin-top:10px;display:flex;align-items:center;gap:7px;background:var(--bg2);color:var(--txt2)}
.status.ok{background:var(--ok-bg);color:var(--ok-txt)}
.status.err{background:var(--err-bg);color:var(--err-txt)}
.dot{width:6px;height:6px;border-radius:50%;background:currentColor;flex-shrink:0}
.player-wrap{background:var(--bg2);border-radius:var(--r);padding:10px}
audio{width:100%;border-radius:6px}
.player-foot{display:flex;justify-content:space-between;font-size:11px;color:var(--txt3);margin-top:6px}
.loop-label{display:flex;align-items:center;gap:5px;font-size:12px;color:var(--txt2);cursor:pointer;user-select:none}
.loop-label input[type=checkbox]{width:13px;height:13px}
.dl-hint{font-size:12px;color:var(--txt3);margin-top:8px}
.mt10{margin-top:10px}
</style>
</head>
<body>
<div class="wrap">
  <div>
    <h1>MCA ↔ WAV Converter</h1>
    <p class="sub">Capcom MADP audio converter · v3 / v4 / v5 · DSP-ADPCM</p>
  </div>

  <div class="card">
    <div class="card-label">Input file</div>
    <label class="drop-zone" id="dropZone">
      <div class="drop-icon">
        <svg width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round" style="color:var(--txt2)"><path d="M21 15v4a2 2 0 0 1-2 2H5a2 2 0 0 1-2-2v-4"/><polyline points="17 8 12 3 7 8"/><line x1="12" y1="3" x2="12" y2="15"/></svg>
      </div>
      <span class="drop-main" id="dropMain">Choose a .mca or .wav file</span>
      <span class="drop-sub">.mca · .wav — drag &amp; drop supported</span>
      <input type="file" accept=".mca,.wav" id="fileIn" style="display:none">
    </label>
    <div class="metrics" id="metrics" style="display:none"></div>
  </div>

  <div class="card">
    <div class="card-label">Loop points</div>
    <div class="field-row">
      <div class="field">
        <label for="ls">Loop start (samples)</label>
        <input type="number" id="ls" value="0" min="0">
      </div>
      <div class="field">
        <label for="le">Loop end (samples)</label>
        <input type="number" id="le" value="0" min="0">
      </div>
    </div>
    <div class="mt10">
      <div class="field">
        <label for="ver">Output MCA version</label>
        <select id="ver">
          <option value="3">v3 — RE Mercs 3D, SSF4 3D</option>
          <option value="4" selected>v4 — EX Troopers, AA5 (default)</option>
          <option value="5">v5 — AA6, MH4U</option>
        </select>
      </div>
    </div>
  </div>

  <div class="card">
    <div class="card-label">Convert</div>
    <div class="btn-row">
      <button id="btnDec" disabled>MCA → WAV</button>
      <button id="btnEnc" disabled>WAV → MCA</button>
    </div>
    <div class="status" id="status" style="display:none"><span class="dot"></span><span id="statusTxt"></span></div>
  </div>

  <div class="card" id="playerCard" style="display:none">
    <div class="card-label" style="display:flex;align-items:center;justify-content:space-between">
      <span>Preview</span>
      <label class="loop-label"><input type="checkbox" id="loopCb" checked> Loop</label>
    </div>
    <div class="player-wrap">
      <audio id="player" controls></audio>
      <div class="player-foot"><span id="pFile"></span><span id="pLoop"></span></div>
    </div>
  </div>

  <div class="card" id="dlCard" style="display:none">
    <div class="card-label">Output</div>
    <div class="btn-row">
      <button class="btn-solid" id="btnDl">⬇ <span id="dlLbl">Download</span></button>
    </div>
    <div class="dl-hint" id="dlHint"></div>
  </div>
</div>

<script>
let fileData=null,fileExt="",fileName="",outBlob=null,outName="",sr=44100;
const player=document.getElementById("player");
const dz=document.getElementById("dropZone");

document.getElementById("fileIn").addEventListener("change",e=>{const f=e.target.files[0];if(f)load(f);});
dz.addEventListener("dragover",e=>{e.preventDefault();dz.classList.add("drag");});
dz.addEventListener("dragleave",()=>dz.classList.remove("drag"));
dz.addEventListener("drop",e=>{e.preventDefault();dz.classList.remove("drag");const f=e.dataTransfer.files[0];if(f)load(f);});
document.getElementById("btnDec").addEventListener("click",decode);
document.getElementById("btnEnc").addEventListener("click",encode);
document.getElementById("btnDl").addEventListener("click",dl);
player.addEventListener("timeupdate",()=>{
  if(!document.getElementById("loopCb").checked)return;
  const ls=getLS(),le=getLE();
  if(le>ls&&player.currentTime*sr>=le)player.currentTime=ls/sr;
});
document.getElementById("ls").addEventListener("input",updateLoop);
document.getElementById("le").addEventListener("input",updateLoop);

function setStatus(m,c){const el=document.getElementById("status");el.className="status "+(c||"");el.style.display="flex";document.getElementById("statusTxt").textContent=m;}
function hex(n){return"0x"+(n>>>0).toString(16).toUpperCase();}
function tick(){return new Promise(r=>setTimeout(r,20));}
function base(n){return n.replace(/\.[^.]+$/,"");}
function getLS(){return parseInt(document.getElementById("ls").value)||0;}
function getLE(){return parseInt(document.getElementById("le").value)||0;}
function getVer(){return parseInt(document.getElementById("ver").value)||4;}
function updateLoop(){const ls=getLS(),le=getLE();document.getElementById("pLoop").textContent=le>ls?`Loop: ${ls.toLocaleString()} → ${le.toLocaleString()} (${((le-ls)/sr).toFixed(2)}s)`:"No loop";}

async function load(f){
  fileName=f.name;fileExt=f.name.split(".").pop().toLowerCase();
  fileData=new Uint8Array(await f.arrayBuffer());
  document.getElementById("dropMain").textContent=f.name;
  document.getElementById("playerCard").style.display="none";
  document.getElementById("dlCard").style.display="none";
  document.getElementById("status").style.display="none";
  document.getElementById("btnDec").disabled=fileExt!=="mca";
  document.getElementById("btnEnc").disabled=fileExt!=="wav";
  if(fileExt==="mca"){
    try{const m=parseMCA(fileData);sr=m.sampleRate;
      document.getElementById("ls").value=m.loopStart;document.getElementById("le").value=m.loopEnd;
      showMetrics([["Version","v"+m.version],["Channels",m.channels],["Rate",m.sampleRate+" Hz"],["Samples",m.numSamples.toLocaleString()],["Loop start",m.loopStart.toLocaleString()],["Loop end",m.loopEnd.toLocaleString()],["Audio at",hex(m.startOffset)],["Header",hex(m.headSize)]]);
      updateLoop();setStatus("MCA v"+m.version+" · "+m.channels+"ch · "+m.sampleRate+" Hz","ok");
    }catch(e){setStatus("Parse error: "+e.message,"err");}
  } else if(fileExt==="wav"){
    try{const w=parseWAV(fileData);sr=w.sampleRate;
      showMetrics([["Channels",w.channels],["Rate",w.sampleRate+" Hz"],["Bit depth",w.bitsPerSample+"b"],["Samples",w.numSamples.toLocaleString()]]);
      updateLoop();setStatus("WAV loaded · "+w.channels+"ch · "+w.sampleRate+" Hz","ok");
    }catch(e){setStatus("Parse error: "+e.message,"err");}
  }
}

function showMetrics(pairs){
  const m=document.getElementById("metrics");
  m.innerHTML=pairs.map(([l,v])=>`<div class="metric"><div class="metric-l">${l}</div><div class="metric-v">${v}</div></div>`).join("");
  m.style.display="grid";
}

async function decode(){
  setStatus("Decoding…","");await tick();
  try{
    const wav=mcaToWav(fileData);
    const blob=new Blob([wav],{type:"audio/wav"});
    const name=base(fileName)+".wav";
    outBlob=blob;outName=name;
    player.src=URL.createObjectURL(blob);
    document.getElementById("playerCard").style.display="";
    document.getElementById("pFile").textContent=name;
    updateLoop();showDl(name,wav.length);setStatus("Decoded → "+name,"ok");
  }catch(e){setStatus("Error: "+e.message,"err");}
}

async function encode(){
  setStatus("Encoding… (LPC analysis, may take a moment)","");await tick();
  try{
    const mca=wavToMca(fileData,getLS(),getLE(),getVer());
    const blob=new Blob([mca],{type:"application/octet-stream"});
    const name=base(fileName)+".mca";
    outBlob=blob;outName=name;
    document.getElementById("playerCard").style.display="none";
    showDl(name,mca.length);setStatus("Encoded → "+name,"ok");
  }catch(e){setStatus("Error: "+e.message,"err");}
}

function showDl(name,bytes){
  document.getElementById("dlLbl").textContent="Download "+name;
  document.getElementById("dlHint").textContent=name+" · "+(bytes/1024).toFixed(1)+" KB";
  document.getElementById("dlCard").style.display="";
}
function dl(){
  if(!outBlob)return;
  const a=document.createElement("a");
  a.href=URL.createObjectURL(outBlob);
  a.download=outName;a.click();
}

// ── MCA PARSER ──────────────────────────────────────────────────────────────
function parseMCA(buf){
  const v=new DataView(buf.buffer,buf.byteOffset),len=buf.length;
  if(String.fromCharCode(buf[0],buf[1],buf[2],buf[3])!=="MADP")throw new Error("Not a MADP/MCA file");
  const version=v.getUint16(0x04,true),channels=v.getUint8(0x08),interleave=v.getUint16(0x0A,true)||0x100;
  const numSamples=v.getUint32(0x0C,true),sampleRate=v.getUint16(0x10,true);
  const loopStart=v.getUint32(0x14,true),loopEnd=v.getUint32(0x18,true),dataSize=v.getUint32(0x20,true);
  if(channels<1||channels>8)throw new Error("Bad channel count: "+channels);
  if(sampleRate<100||sampleRate>192000)throw new Error("Bad sample rate: "+sampleRate);
  if(dataSize===0||dataSize>len)throw new Error("Bad data_size: "+hex(dataSize));
  const CS=0x30;let headSize,coefShift,startOffset;
  if(version<=3){headSize=len-dataSize;coefShift=0;startOffset=headSize;}
  else{headSize=v.getUint16(0x1C,true);coefShift=v.getUint16(0x28,true);startOffset=len-dataSize;}
  const coefOffset=(headSize-CS*channels)+coefShift*0x14;
  if(startOffset<0||startOffset>=len)throw new Error("Audio start out of range: "+hex(startOffset));
  if(coefOffset<0||coefOffset+CS*channels>startOffset)throw new Error("Coef block out of range: "+hex(coefOffset));
  return{version,channels,interleave,numSamples,sampleRate,loopStart,loopEnd,headSize,coefOffset,startOffset,dataSize};
}

// ── MCA → WAV ───────────────────────────────────────────────────────────────
function mcaToWav(buf){
  const m=parseMCA(buf);const dv=new DataView(buf.buffer,buf.byteOffset);
  const coefs=[];
  for(let ch=0;ch<m.channels;ch++){const c=new Int16Array(16);for(let i=0;i<16;i++)c[i]=dv.getInt16(m.coefOffset+ch*0x30+i*2,true);coefs.push(c);}
  const pcm=decodeDSP(buf.slice(m.startOffset),m.channels,m.numSamples,coefs,m.interleave);
  return buildWAV(pcm,m.channels,m.sampleRate);
}

function decodeDSP(src,channels,totalSamples,coefs,interleave){
  const SPB=14,BPB=8,fpB=Math.floor(interleave/BPB);
  const out=new Int16Array(totalSamples*channels);
  const h1=new Int32Array(channels),h2=new Int32Array(channels),done=new Int32Array(channels);
  let block=0;
  while(true){
    let any=false;for(let ch=0;ch<channels;ch++)if(done[ch]<totalSamples){any=true;break;}
    if(!any)break;
    for(let ch=0;ch<channels;ch++){
      if(done[ch]>=totalSamples)continue;
      const bBase=(block*channels+ch)*interleave;if(bBase>=src.length)break;
      for(let f=0;f<fpB&&done[ch]<totalSamples;f++){
        const fOff=bBase+f*BPB;if(fOff>=src.length)break;
        const hdr=src[fOff],scale=1<<(hdr&0xF),ci=(hdr>>4)&0x7;
        const c1=coefs[ch][ci*2],c2=coefs[ch][ci*2+1];
        for(let s=0;s<SPB&&done[ch]<totalSamples;s++){
          const bi=fOff+1+(s>>1);if(bi>=src.length)break;
          const raw=(s&1)?(src[bi]&0xF):((src[bi]>>4)&0xF);
          const nib=raw>=8?raw-16:raw;
          let smp=(((nib*scale)<<11)+1024+c1*h1[ch]+c2*h2[ch])>>11;
          smp=Math.max(-32768,Math.min(32767,smp));
          h2[ch]=h1[ch];h1[ch]=smp;out[done[ch]*channels+ch]=smp;done[ch]++;
        }
      }
    }
    block++;if(block*channels*interleave>=src.length)break;
  }
  return out;
}

function buildWAV(pcm,channels,sampleRate){
  const db=pcm.length*2,ab=new ArrayBuffer(44+db),dv=new DataView(ab);
  const ws=(o,s)=>{for(let i=0;i<s.length;i++)dv.setUint8(o+i,s.charCodeAt(i));};
  ws(0,"RIFF");dv.setUint32(4,36+db,true);ws(8,"WAVE");ws(12,"fmt ");dv.setUint32(16,16,true);dv.setUint16(20,1,true);
  dv.setUint16(22,channels,true);dv.setUint32(24,sampleRate,true);dv.setUint32(28,sampleRate*channels*2,true);
  dv.setUint16(32,channels*2,true);dv.setUint16(34,16,true);ws(36,"data");dv.setUint32(40,db,true);
  new Int16Array(ab,44).set(pcm);return new Uint8Array(ab);
}

function parseWAV(buf){
  const dv=new DataView(buf.buffer,buf.byteOffset);
  if(String.fromCharCode(buf[0],buf[1],buf[2],buf[3])!=="RIFF")throw new Error("Not a RIFF WAV");
  const channels=dv.getUint16(22,true),sampleRate=dv.getUint32(24,true),bitsPerSample=dv.getUint16(34,true);
  if(bitsPerSample!==16)throw new Error("Only 16-bit PCM WAV supported");
  let off=12;
  while(off<buf.length-8){
    const id=String.fromCharCode(buf[off],buf[off+1],buf[off+2],buf[off+3]),sz=dv.getUint32(off+4,true);
    if(id==="data")return{channels,sampleRate,bitsPerSample,numSamples:Math.floor(sz/(channels*2)),dataOffset:off+8,dataSize:sz};
    off+=8+sz+(sz&1);
  }
  throw new Error("No data chunk in WAV");
}

// ── WAV → MCA ───────────────────────────────────────────────────────────────
function wavToMca(buf,loopStart=0,loopEnd=0,version=4){
  const{channels,sampleRate,numSamples,dataOffset,dataSize}=parseWAV(buf);
  const pcm=new Int16Array(buf.buffer,buf.byteOffset+dataOffset,dataSize>>1);
  const INTERLEAVE=0x100,SPB=14,fpB=Math.floor(INTERLEAVE/8),CS=0x30;
  // headSize matches C# source: (version<5 ? 0x34 : 0x38) + 0x30*channels
  // but v3 has no headSize field so we compute it the same way for layout
  const BASE_HDR=version>=5?0x38:0x34;
  const headSize=BASE_HDR+channels*CS;
  const chEnc=[],coefs=[];
  for(let ch=0;ch<channels;ch++){
    const mono=new Int16Array(numSamples);
    for(let s=0;s<numSamples;s++)mono[s]=pcm[s*channels+ch];
    const c=dspCorrelateCoefs(mono);
    coefs.push(c);chEnc.push(encodeMono(mono,c));
  }
  const totalBlocks=Math.ceil(Math.ceil(numSamples/SPB)/fpB);
  const audioBytes=totalBlocks*channels*INTERLEAVE;
  const out=new Uint8Array(headSize+audioBytes);
  const dv=new DataView(out.buffer);
  // MADP magic
  out[0]=0x4D;out[1]=0x41;out[2]=0x44;out[3]=0x50;
  dv.setUint16(0x04,version,true);
  dv.setUint8(0x08,channels);
  dv.setUint16(0x0A,INTERLEAVE,true);
  dv.setUint32(0x0C,numSamples,true);
  dv.setUint16(0x10,sampleRate,true);
  dv.setUint32(0x14,loopStart,true);
  dv.setUint32(0x18,loopEnd,true);
  if(version<=3){
    // v3: headSize field not present, dataSize at 0x20
    dv.setUint32(0x20,audioBytes,true);
  } else {
    // v4+: headSize at 0x1C, dataSize at 0x20, coefShift at 0x28
    dv.setUint16(0x1C,headSize,true);
    dv.setUint32(0x20,audioBytes,true);
    dv.setUint16(0x28,0,true);
    if(version>=5){
      // v5: extra int at 0x30 = audio start offset (= headSize)
      dv.setUint32(0x30,headSize,true);
    }
  }
  // Write coefs — start at BASE_HDR (0x34 for v4, 0x38 for v5)
  for(let ch=0;ch<channels;ch++){
    const cOff=BASE_HDR+ch*CS;
    for(let i=0;i<16;i++)dv.setInt16(cOff+i*2,coefs[ch][i],true);
  }
  for(let b=0;b<totalBlocks;b++)
    for(let ch=0;ch<channels;ch++){
      const src=chEnc[ch].slice(b*INTERLEAVE,(b+1)*INTERLEAVE);
      out.set(src,headSize+(b*channels+ch)*INTERLEAVE);
    }
  return out;
}

// ── LPC COEF DERIVATION ─────────────────────────────────────────────────────
function dspCorrelateCoefs(pcm){
  const numFrames=Math.ceil(pcm.length/14);
  const records=[];
  const hist=[new Float64Array(14),new Float64Array(14)];
  for(let fi=0;fi<numFrames;fi++){
    for(let z=0;z<14;z++)hist[0][z]=hist[1][z];
    for(let z=0;z<14;z++)hist[1][z]=(fi*14+z<pcm.length)?pcm[fi*14+z]:0;
    const vec1=innerProductMerge(hist[1]);
    if(Math.abs(vec1[0])>10.0){
      const mtx=outerProductMerge(hist[1]);
      const vidxs=[0,0,0];
      if(!analyzeRanges(mtx,vidxs)){
        bidirectionalFilter(mtx,vidxs,vec1);
        if(!quadraticMerge(vec1)){const rec=new Float64Array(3);finishRecord(vec1,rec);records.push(rec);}
      }
    }
  }
  const vecBest=Array.from({length:8},()=>new Float64Array(3));
  const vec1=new Float64Array([1.0,0.0,0.0]);
  if(records.length===0)return new Int16Array(16);
  for(const r of records){const tmp=new Float64Array(3);matrixFilter(r,tmp);for(let y=1;y<=2;y++)vec1[y]+=tmp[y];}
  for(let y=1;y<=2;y++)vec1[y]/=records.length;
  mergeFinishRecord(vec1,vecBest[0]);
  let exp=1;
  for(let w=0;w<3;w++){
    const vec2=new Float64Array([0.0,-1.0,0.0]);
    for(let i=0;i<exp;i++)for(let y=0;y<=2;y++)vecBest[exp+i][y]=0.01*vec2[y]+vecBest[i][y];
    exp=1<<(++w);filterRecords(vecBest,exp,records);
  }
  filterRecords(vecBest,8,records);
  const out=new Int16Array(16);
  for(let z=0;z<8;z++){
    let d=-vecBest[z][1]*2048.0;out[z*2]=d>32767?32767:d<-32768?-32768:Math.round(d)|0;
    d=-vecBest[z][2]*2048.0;out[z*2+1]=d>32767?32767:d<-32768?-32768:Math.round(d)|0;
  }
  return out;
}

function innerProductMerge(b){const v=new Float64Array(3);for(let i=0;i<=2;i++){v[i]=0;for(let x=0;x<14;x++)v[i]-=(b[x]||0)*(x>=i?b[x-i]:0);}return v;}
function outerProductMerge(b){const mtx=[[],[new Float64Array(3)],[new Float64Array(3)]];for(let x=1;x<=2;x++)for(let y=1;y<=2;y++){mtx[x][y]=0;for(let z=0;z<14;z++)mtx[x][y]+=(z>=x?b[z-x]:0)*(z>=y?b[z-y]:0);}return mtx;}
function analyzeRanges(mtx,vi){
  const rec=[0,0,0];
  for(let x=1;x<=2;x++){const val=Math.max(Math.abs(mtx[x][1]),Math.abs(mtx[x][2]));if(val<Number.EPSILON)return true;rec[x]=1/val;}
  let mi=0;
  for(let i=1;i<=2;i++){
    for(let x=1;x<i;x++){let t=mtx[x][i];for(let y=1;y<x;y++)t-=mtx[x][y]*mtx[y][i];mtx[x][i]=t;}
    let val=0;
    for(let x=i;x<=2;x++){let t=mtx[x][i];for(let y=1;y<i;y++)t-=mtx[x][y]*mtx[y][i];mtx[x][i]=t;const q=Math.abs(t)*rec[x];if(q>=val){val=q;mi=x;}}
    if(mi!==i){for(let y=1;y<=2;y++){const t=mtx[mi][y];mtx[mi][y]=mtx[i][y];mtx[i][y]=t;}rec[mi]=rec[i];}
    vi[i]=mi;if(mtx[i][i]===0)return true;
    if(i!==2){const t=1/mtx[i][i];for(let x=i+1;x<=2;x++)mtx[x][i]*=t;}
  }
  const mn=Math.min(Math.abs(mtx[1][1]),Math.abs(mtx[2][2])),mx=Math.max(Math.abs(mtx[1][1]),Math.abs(mtx[2][2]));
  return mn/mx<1e-10;
}
function bidirectionalFilter(mtx,vi,vo){
  let x=0;
  for(let i=1;i<=2;i++){const idx=vi[i];let t=vo[idx];vo[idx]=vo[i];if(x!==0)for(let y=x;y<=i-1;y++)t-=vo[y]*mtx[i][y];else if(t!==0)x=i;vo[i]=t;}
  for(let i=2;i>0;i--){let t=vo[i];for(let y=i+1;y<=2;y++)t-=vo[y]*mtx[i][y];vo[i]=t/mtx[i][i];}
  vo[0]=1.0;
}
function quadraticMerge(v){const v2=v[2],tmp=1-(v2*v2);if(tmp===0)return true;v[0]=(v[0]-(v2*v2))/tmp;v[1]=(v[1]-(v[1]*v2))/tmp;return Math.abs(v[1])>1.0;}
function finishRecord(inp,out){const v=new Float64Array(inp);for(let z=1;z<=2;z++){if(v[z]>=1)v[z]=0.9999999999;else if(v[z]<=-1)v[z]=-0.9999999999;}out[0]=1.0;out[1]=(v[2]*v[1])+v[1];out[2]=v[2];}
function matrixFilter(src,dst){
  const mtx=[[],[new Float64Array(3)],[new Float64Array(3)]];
  mtx[2][0]=1.0;for(let i=1;i<=2;i++)mtx[2][i]=-src[i];
  for(let i=2;i>0;i--){const val=1-(mtx[i][i]*mtx[i][i]);for(let y=1;y<=i;y++)mtx[i-1][y]=((mtx[i][i]*mtx[i][y])+mtx[i][y])/val;}
  dst[0]=1.0;for(let i=1;i<=2;i++){dst[i]=0;for(let y=1;y<=i;y++)dst[i]+=mtx[i][y]*dst[i-y];}
}
function mergeFinishRecord(src,dst){
  let val=src[0];dst[0]=1.0;const tmp=new Float64Array(3);
  for(let i=1;i<=2;i++){
    let v2=0;for(let y=1;y<i;y++)v2+=dst[y]*src[i-y];
    dst[i]=val>0?-(v2+src[i])/val:0;tmp[i]=dst[i];
    for(let y=1;y<i;y++)dst[y]+=dst[i]*dst[i-y];val*=1-(dst[i]*dst[i]);
  }
  finishRecord(tmp,dst);
}
function contrastVectors(s1,s2){
  const val=(s2[2]*s2[1]+-s2[1])/(1-(s2[2]*s2[2]));
  const v1=s1[0]*s1[0]+s1[1]*s1[1]+s1[2]*s1[2];
  const v2=s1[0]*s1[1]+s1[1]*s1[2],v3=s1[0]*s1[2];
  return v1+(2*val*v2)+(2*(-s2[1]*val+-s2[2])*v3);
}
function filterRecords(vecBest,exp,records){
  for(let x=0;x<2;x++){
    const cnt=new Int32Array(exp),bufList=Array.from({length:exp},()=>new Float64Array(3));
    for(const rec of records){
      let idx=0,best=1e30;
      for(let i=0;i<exp;i++){const v=contrastVectors(vecBest[i],rec);if(v<best){best=v;idx=i;}}
      cnt[idx]++;const tmp=new Float64Array(3);matrixFilter(rec,tmp);for(let i=0;i<=2;i++)bufList[idx][i]+=tmp[i];
    }
    for(let i=0;i<exp;i++){if(cnt[i]>0)for(let y=0;y<=2;y++)bufList[i][y]/=cnt[i];mergeFinishRecord(bufList[i],vecBest[i]);}
  }
}

// ── DSP FRAME ENCODER ────────────────────────────────────────────────────────
function dspEncodeFrame(pcmInOut,sampleCount,coefsFlat){
  const inS=Array.from({length:8},()=>new Int32Array(16));
  const outS=Array.from({length:8},()=>new Int32Array(14));
  const scale=new Int32Array(8),dist=new Float64Array(8);
  let best=0;
  for(let i=0;i<8;i++){
    const c0=coefsFlat[i*2],c1=coefsFlat[i*2+1];
    inS[i][0]=pcmInOut[0];inS[i][1]=pcmInOut[1];
    let distance=0;
    for(let s=0;s<sampleCount;s++){
      const v1=((pcmInOut[s+1]*c0)+(pcmInOut[s]*c1))/2048|0;
      inS[i][s+2]=v1;
      const v2=pcmInOut[s+2]-v1,v3=v2>=32767?32767:v2<=-32768?-32768:v2;
      if(Math.abs(v3)>Math.abs(distance))distance=v3;
    }
    scale[i]=0;while(scale[i]<=12&&(distance>7||distance<-8)){scale[i]++;distance=distance/2|0;}
    scale[i]=scale[i]<=1?-1:scale[i]-2;
    let index=0;
    do{
      scale[i]++;dist[i]=0;index=0;
      for(let s=0;s<sampleCount;s++){
        const v1=(inS[i][s]*c1)+(inS[i][s+1]*c0);
        const v2=((pcmInOut[s+2]<<11)-v1)/2048|0;
        const sc=1<<scale[i];
        let v3=v2>0?Math.floor(v2/sc+0.4999999):Math.ceil(v2/sc-0.4999999);
        if(v3<-8){const ov=-8-v3;if(index<ov)index=ov;v3=-8;}
        else if(v3>7){const ov=v3-7;if(index<ov)index=ov;v3=7;}
        outS[i][s]=v3;
        const rv=(v1+((v3*sc)<<11)+1024)>>11;
        inS[i][s+2]=rv>=32767?32767:rv<=-32768?-32768:rv;
        const d=pcmInOut[s+2]-inS[i][s+2];dist[i]+=d*d;
      }
      for(let x=index+8;x>256;x>>=1)if(++scale[i]>=12){scale[i]=11;break;}
    }while(scale[i]<12&&index>1);
  }
  let min=Infinity;for(let i=0;i<8;i++)if(dist[i]<min){min=dist[i];best=i;}
  for(let s=0;s<sampleCount;s++)pcmInOut[s+2]=inS[best][s+2];
  const adpcm=new Uint8Array(8);
  adpcm[0]=(best<<4)|(scale[best]&0xF);
  for(let y=0;y<7;y++)adpcm[y+1]=((outS[best][y*2]&0xF)<<4)|(outS[best][y*2+1]&0xF);
  return adpcm;
}

function encodeMono(pcm,coefs){
  const SPB=14,BPB=8,frames=Math.ceil(pcm.length/SPB);
  const out=new Uint8Array(frames*BPB);
  const pcmInOut=new Int32Array(16);
  for(let f=0;f<frames;f++){
    const b=f*SPB,count=Math.min(SPB,pcm.length-b);
    for(let s=0;s<count;s++)pcmInOut[s+2]=pcm[b+s];
    for(let s=count;s<SPB;s++)pcmInOut[s+2]=0;
    const adpcm=dspEncodeFrame(pcmInOut,count,coefs);
    out.set(adpcm,f*BPB);
    pcmInOut[0]=pcmInOut[SPB];pcmInOut[1]=pcmInOut[SPB+1];
  }
  return out;
}
